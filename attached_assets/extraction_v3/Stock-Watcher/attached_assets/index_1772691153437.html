<title>Mine Invest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#080c14;min-height:100%;font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;color:#c8d6e5;overscroll-behavior:none}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1e3050;border-radius:2px}
/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
#header{background:linear-gradient(180deg,#0d1828 0%,#080c14 100%);border-bottom:1px solid #1e3050;padding:12px 14px;flex-shrink:0}
#tabbar{display:flex;border-bottom:1px solid #1e3050;background:#080c14;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;scrollbar-width:none}
#tabbar::-webkit-scrollbar{display:none}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}
/* Tabs */
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:#4a6080;font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;font-size:10px;letter-spacing:.3px;cursor:pointer;padding:9px 10px;white-space:nowrap;text-transform:uppercase;transition:color .2s}
.tab-btn.on{color:#00e5a0;border-bottom-color:#00e5a0}
.tab-btn:active{opacity:.7}
/* Buttons */
.btn-g{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2);color:#00e5a0;font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;font-size:11px;padding:6px 12px;border-radius:4px;cursor:pointer}
.btn-p{background:linear-gradient(135deg,#00c87a,#00e5a0);color:#080c14;border:none;font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;font-weight:700;font-size:12px;padding:10px 20px;border-radius:4px;cursor:pointer}
.btn-v{background:rgba(120,100,255,.08);border:1px solid rgba(120,100,255,.25);color:#a78bfa;font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;font-size:11px;padding:5px 10px;border-radius:4px;cursor:pointer}
.btn-d{background:none;border:none;color:#ff4d6d;cursor:pointer;font-size:14px;padding:2px 6px;opacity:.5}
/* Inputs */
input,select,textarea{background:#0d1828;border:1px solid #1e3050;color:#c8d6e5;font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;font-size:13px;padding:8px 12px;border-radius:4px;outline:none;width:100%;transition:border .15s}
input:focus,select:focus{border-color:#00e5a0}
label.lbl{font-size:9px;color:#4a6080;letter-spacing:1px;display:block;margin-bottom:4px;margin-top:10px;text-transform:uppercase}
/* Cards */
.mini-card{background:#0d1828;border:1px solid #1e3050;border-radius:6px;padding:8px 10px}
.asset-card{background:#0d1828;border:1px solid #1e3050;border-radius:8px;overflow:hidden;margin:0 12px 10px;cursor:pointer}
.asset-card:active{opacity:.85}
/* Table */
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 8px;color:#4a6080;font-weight:400;font-size:9px;letter-spacing:1px;white-space:nowrap}
td{padding:8px 8px;border-bottom:1px solid #0d1828}
tr:active td{background:rgba(255,255,255,.03)}
/* Pill badge */
.pill{padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700}
.pill-g{background:rgba(0,229,160,.12);color:#00e5a0}
.pill-r{background:rgba(255,77,109,.12);color:#ff4d6d}
.pill-b{background:rgba(122,162,255,.12);color:#7aa2ff}
.pill-o{background:rgba(249,115,22,.12);color:#f97316}
/* Modal */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
#modal-overlay.show{display:flex}
#modal-box{background:#0d1828;border:1px solid #1e3050;border-radius:12px;padding:20px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto}
/* Segment */
.seg{display:flex;background:#060a10;border-radius:6px;padding:3px;gap:3px;margin-bottom:12px}
.seg-btn{flex:1;background:none;border:none;color:#4a6080;font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;font-size:10px;padding:7px 2px;border-radius:4px;cursor:pointer}
.seg-btn.on{background:#1a2a40;color:#e8f4ff}
/* Form panel */
#form-panel{display:none;background:#070b13;border-bottom:1px solid #1e3050;padding:14px}
#form-panel.show{display:block}
/* Allocation bar */
.alloc-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;gap:2px}
/* Editable price */
.editable{cursor:pointer;border-bottom:1px dashed #2a4060;font-size:11px;color:#e8f4ff}
.price-input-inline{width:80px;background:#0d1828;border:1px solid #00e5a0;color:#00e5a0;font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;font-size:12px;padding:2px 6px;border-radius:3px;outline:none}
/* Ticker colors */
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
/* Grid helpers */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 12px 6px}
.span2{grid-column:1/-1}
/* Row hover */
.trow:hover td{background:rgba(255,255,255,.02)}
/* Status dot */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.blink{animation:blink 1s infinite}
</style>
</head>

<div id="app">

  <div id="tabbar"></div>
  <div id="form-panel"></div>
  <div id="content"></div>
</div>

<div id="modal-overlay"><div id="modal-box"></div></div>

const bgc = n => n>=0?'rgba(0,229,160,.12)':'rgba(255,77,109,.12)';

// ═══════════════════════════════════════════════════════
//  COMPUTED (pure functions from S)
// ═══════════════════════════════════════════════════════
function calcStocks() {
  const map = {};
  (S.stockTx||[]).forEach(tx=>{
    if(!map[tx.sym]) map[tx.sym]={sym:tx.sym,sh:0,cost:0,div:0,divList:[]};
    const h=map[tx.sym];
    if(tx.type==='BUY'){h.cost+=tx.qty*tx.price;h.sh+=tx.qty;}
    else if(tx.type==='SELL'){const a=h.sh>0?h.cost/h.sh:0;h.cost-=a*tx.qty;h.sh-=tx.qty;}
    else if(tx.type==='DIVIDEND'){const d=tx.qty*tx.price;h.div+=d;h.divList.push({date:tx.date,amt:d,note:tx.note});}
  });
  return Object.values(map).filter(h=>h.sh>0).map(h=>{
    const avg=h.sh>0?h.cost/h.sh:0, cur=S.stockPx[h.sym]||avg;
    const mv=h.sh*cur,cb=h.sh*avg,pnl=mv-cb,pct=cb>0?(pnl/cb)*100:0;
    return {...h,name:S.stockMeta[h.sym]||'',avg,cur,mv,cb,pnl,pct};
  }).sort((a,b)=>a.sym.localeCompare(b.sym));
}
function calcFunds() {
  const map={};
  (S.fundTx||[]).forEach(tx=>{
    if(!map[tx.sym]) map[tx.sym]={sym:tx.sym,iv:0,div:0,divList:[]};
    const f=map[tx.sym];
    if(tx.type==='BUY')f.iv+=tx.amount;
    else if(tx.type==='SELL')f.iv-=tx.amount;
    else if(tx.type==='DIVIDEND'){f.div+=tx.amount;f.divList.push({date:tx.date,amt:tx.amount,note:tx.note});}
  });
  return Object.values(map).filter(f=>f.iv>0).map(f=>{
    const cur=S.fundPx[f.sym]||f.iv,pnl=cur-f.iv,pct=f.iv>0?(pnl/f.iv)*100:0;
    const meta=S.fundMeta[f.sym]||{n:'',cat:'อื่นๆ',units:0,avgNav:0};
    return {...f,...meta,cur,pnl,pct};
  }).sort((a,b)=>a.sym.localeCompare(b.sym));
}
function calcCrypto() {
  const map={};
  (S.cryptoTx||[]).forEach(tx=>{
    if(!map[tx.sym]) map[tx.sym]={sym:tx.sym,qty:0,cost:0,hasCost:false};
    const c=map[tx.sym];
    if(tx.type==='BUY'){if(tx.price>0){c.cost+=tx.qty*tx.price;c.hasCost=true;}c.qty+=tx.qty;}
    else if(tx.type==='SELL'){const a=c.qty>0?c.cost/c.qty:0;c.cost-=a*tx.qty;c.qty-=tx.qty;}
  });
  return Object.values(map).filter(c=>c.qty>0).map(c=>{
    const avg=c.qty>0&&c.hasCost?c.cost/c.qty:0,cur=S.cryptoPx[c.sym]||0;
    const mv=c.qty*cur,cb=c.hasCost?c.qty*avg:0,pnl=c.hasCost?mv-cb:0,pct=cb>0?(pnl/cb)*100:0;
    const meta=S.cryptoMeta[c.sym]||{n:c.sym,cgid:''};
    return {...c,...meta,avg,cur,mv,cb,pnl,pct};
  }).sort((a,b)=>b.mv-a.mv);
}
function calcBondSum() {
  const mv=(S.bonds||[]).reduce((s,b)=>s+b.face,0);
  const ai=(S.bonds||[]).reduce((s,b)=>s+(b.face*b.rate/100),0);
  return {mv,ai};
}
function sums() {
  const stocks=calcStocks(), funds=calcFunds(), crypto=calcCrypto(), bSum=calcBondSum();
  const sMv=stocks.reduce((s,h)=>s+h.mv,0), sCost=stocks.reduce((s,h)=>s+h.cb,0), sDiv=stocks.reduce((s,h)=>s+h.div,0);
  const sPnl=sMv-sCost, sPct=sCost>0?(sPnl/sCost)*100:0;
  const fMv=funds.reduce((s,f)=>s+f.cur,0), fCost=funds.reduce((s,f)=>s+f.iv,0), fDiv=funds.reduce((s,f)=>s+f.div,0);
  const fPnl=fMv-fCost, fPct=fCost>0?(fPnl/fCost)*100:0;
  const cMv=crypto.reduce((s,c)=>s+c.mv,0), cCost=crypto.filter(c=>c.hasCost).reduce((s,c)=>s+c.cb,0);
  const cPnl=crypto.filter(c=>c.hasCost).reduce((s,c)=>s+c.pnl,0), cPct=cCost>0?(cPnl/cCost)*100:0;
  const totalDiv=sDiv+fDiv+bSum.ai;
  const grandMv=sMv+fMv+bSum.mv+cMv, grandCost=sCost+fCost+bSum.mv+cCost;
  const grandPnl=sPnl+fPnl+cPnl, grandPct=grandCost>0?(grandPnl/grandCost)*100:0;
  return {stocks,funds,crypto,
    s:{mv:sMv,cost:sCost,pnl:sPnl,pct:sPct,div:sDiv,w:stocks.filter(h=>h.pnl>0).length,l:stocks.filter(h=>h.pnl<0).length},
    f:{mv:fMv,cost:fCost,pnl:fPnl,pct:fPct,div:fDiv,w:funds.filter(f=>f.pnl>0).length,l:funds.filter(f=>f.pnl<0).length},
    b:{...bSum,count:(S.bonds||[]).length},
    c:{mv:cMv,cost:cCost,pnl:cPnl,pct:cPct},
    grand:{mv:grandMv,cost:grandCost,pnl:grandPnl,pct:grandPct,div:totalDiv}
  };
}

// ═══════════════════════════════════════════════════════
//  LIVE CRYPTO PRICES

async function fetchPrices() {
  S.cryptoStatus='loading'; render();
  try {
    const ids=[...new Set((S.cryptoMeta?Object.values(S.cryptoMeta):INIT_CRYPTO).map(c=>c.cgid||'').filter(Boolean))].join(',');
    const res=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=thb`);
    if(!res.ok) throw new Error();
    const data=await res.json();
    Object.keys(S.cryptoMeta||{}).forEach(sym=>{
      const meta=S.cryptoMeta[sym];
      if(meta&&meta.cgid&&data[meta.cgid]&&data[meta.cgid].thb) S.cryptoPx[sym]=data[meta.cgid].thb;
    });
    S.cryptoStatus='ok';
    S.lastUpdate=new Date().toLocaleTimeString('th-TH');
  } catch(e){ S.cryptoStatus='error'; }
  saveState(); render();
}

function renderTabbar() {
  const tabs=[['summary','🏠 ภาพรวม'],['stocks','📈 หุ้น'],['funds','🏦 กองทุน'],['bonds','🏛 หุ้นกู้'],['crypto','🪙 คริปโต'],['dividends','💰 ปันผล'],['history','📋 รายการ']];
  document.getElementById('tabbar').innerHTML=
    tabs.map(([k,v])=>`<button class="tab-btn${S.tab===k?' on':''}" onclick="setTab('${k}')">${v}</button>`).join('')+
    `<div style="flex:1"></div>
     <button class="btn-v" style="margin:5px 4px;font-size:10px;padding:5px 8px" onclick="openModal('new')">＋ใหม่</button>
     <button class="btn-g" style="margin:5px 6px;font-size:10px;padding:5px 8px" onclick="toggleForm()">${S.formOpen?'✕ ปิด':'+ รายการ'}</button>`;
}

    </div>`;
  }
  p.innerHTML=`
    <div class="seg">${assets.map(([k,v])=>`<button class="seg-btn${S.formAsset===k?' on':''}" onclick="setFormAsset('${k}')">${v}</button>`).join('')}</div>

}

// ── TAB CONTENT ──────────────────────────────────────────
function renderContent(C) {
  const el=document.getElementById('content');
  if(S.tab==='summary')   el.innerHTML=tabSummary(C);
  else if(S.tab==='stocks')   el.innerHTML=tabStocks(C);
  else if(S.tab==='funds')    el.innerHTML=tabFunds(C);
  else if(S.tab==='bonds')    el.innerHTML=tabBonds(C);
  else if(S.tab==='crypto')   el.innerHTML=tabCrypto(C);
  else if(S.tab==='dividends')el.innerHTML=tabDiv(C);
  else if(S.tab==='history')  el.innerHTML=tabHistory(C);
}

function tabFunds(C) {
  const groups=FUND_CATS.filter(cat=>C.funds.some(f=>f.cat===cat)).map(cat=>{

    const cmv=items.reduce((s,f)=>s+f.cur,0),cc=items.reduce((s,f)=>s+f.iv,0),cpnl=cmv-cc,cpct=cc>0?(cpnl/cc)*100:0;
    const cc2=CAT_CLR[cat]||'#c8d6e5';
    const rows=items.map(f=>`
      <div class="trow" style="border-bottom:1px solid #0d1828;padding:10px 12px;display:flex;align-items:center;gap:10px">
        <div style="flex:1;min-width:0">

          <div style="font-size:9px;color:#3a5070;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.n)}</div>

        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:12px;color:#e8f4ff;font-weight:600">${editableCell(f.sym,'fund',f.cur,0)}</div>
          <div style="font-size:9px;color:#3a5878;margin-top:1px">ต้นทุน ฿${fmt(f.iv,0)}</div>
          ${f.div>0?`<div style="font-size:9px;color:#7aa2ff">ปันผล ฿${fmt(f.div,0)}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:11px;color:${clr(f.pnl)};font-weight:600">${f.pnl>=0?'+':''}฿${fmt(f.pnl,0)}</div>
          <span style="background:${bgc(f.pct)};color:${clr(f.pct)};padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700;display:inline-block;margin-top:2px">${fmtP(f.pct)}</span>
        </div>
      </div>`).join('');
    return `
      <div style="display:flex;align-items:center;gap:7px;padding:10px 12px 4px;border-top:1px solid #0d1828">

      </div>${rows}`;
  }).join('');
  return `
  ${miniCards([['มูลค่า',`฿${fmt(C.f.mv,0)}`,'#e8f4ff'],['กำไร/ขาดทุน',`${C.f.pnl>=0?'+':''}฿${fmt(C.f.pnl,0)}`,clr(C.f.pnl)],['%',fmtP(C.f.pct),clr(C.f.pct)]])}
  <div style="padding:0 12px 8px;font-size:9px;color:#4a6080">ชนะ <span style="color:#00e5a0">${C.f.w}</span> · แพ้ <span style="color:#ff4d6d">${C.f.l}</span></div>

}

  <div style="padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #0d1828">
    <div style="display:flex;align-items:center;gap:6px">${statusDot}<span style="font-size:9px;color:#4a6080">${statusTxt}</span></div>
    <button class="btn-g" style="font-size:9px;padding:4px 10px" onclick="fetchPrices()">🔄 รีเฟรช</button>
  </div>
  ${miniCards([['มูลค่ารวม',`฿${fmt(C.c.mv,0)}`,'#e8f4ff'],['กำไร/ขาดทุน',C.c.cost>0?`${C.c.pnl>=0?'+':''}฿${fmt(C.c.pnl,0)}`:'N/A',C.c.cost>0?clr(C.c.pnl):'#4a6080'],['%',C.c.cost>0?fmtP(C.c.pct):'N/A',C.c.cost>0?clr(C.c.pct):'#4a6080']])}
  <div style="overflow-x:auto"><table>
    <thead><tr>${['เหรียญ','จำนวน','ราคา (THB)','มูลค่า (THB)','กำไร/ขาดทุน'].map((h,i)=>`<th style="text-align:${i===0?'left':'right'}">${h}</th>`).join('')}</tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  <div style="padding:8px;text-align:center;font-size:9px;color:#1e3050">💡 ราคาจาก CoinGecko · แตะราคาเพื่ออัพเดทด้วยตนเอง</div>`;
}

// ── DIVIDENDS ────────────────────────────────────────────
function tabDiv(C) {
  const totalDiv=C.grand.div, bondAi=C.b.ai, stockFundDiv=C.s.div+C.f.div;
  const items=[];
  C.stocks.forEach(h=>{if(h.div>0)items.push({sym:h.sym,name:h.name,type:'stock',received:h.div,list:h.divList});});
  C.funds.forEach(f=>{if(f.div>0)items.push({sym:f.sym,name:f.n,type:'fund',received:f.div,list:f.divList});});
  (S.bonds||[]).forEach(b=>{const ai=b.face*b.rate/100;items.push({sym:b.s,name:b.n,type:'bond',annual:ai,received:0,list:[],rate:b.rate,mat:b.mat,next:b.next});});

  const itemCards=items.map(item=>{
    const typePill=item.type==='stock'?'<span class="pill pill-g">หุ้น</span>':item.type==='fund'?'<span class="pill" style="background:rgba(96,165,250,.12);color:#60a5fa">กองทุน</span>':'<span class="pill pill-o">หุ้นกู้</span>';
    const history=item.list&&item.list.length>0?`<div style="border-top:1px solid #0a1520">${item.list.map((d,i)=>`<div style="padding:6px 14px;display:flex;justify-content:space-between;${i<item.list.length-1?'border-bottom:1px solid #060a10':''}"><span style="font-size:9px;color:#4a6080">${esc(d.date)}${d.note&&d.note!=='Initial'?' · '+esc(d.note):''}</span><span style="font-size:10px;color:#7aa2ff;font-weight:600">+฿${fmt(d.amt,2)}</span></div>`).join('')}</div>`:'';
    const right=item.type==='bond'?`<div><div style="font-size:13px;font-weight:700;color:#f97316">฿${fmt(item.annual,0)}<span style="font-size:9px;color:#4a6080">/ปี</span></div><div style="font-size:9px;color:#fba47a">฿${fmt(item.annual/2,2)}/งวด</div><div style="font-size:9px;color:#3a5878">ถัดไป ${esc(item.next||'')}</div></div>`:
      `<div><div style="font-size:13px;font-weight:700;color:#7aa2ff">฿${fmt(item.received,0)}</div><div style="font-size:9px;color:#4a6080">${(item.list||[]).length} ครั้ง</div></div>`;
    return `<div style="margin:0 12px 8px;background:#0d1828;border:1px solid #1e3050;border-radius:6px;overflow:hidden">
      <div style="padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="font-family:'Sora',ui-sans-serif,-apple-system,sans-serif;font-weight:700;color:#e8f4ff;font-size:12px">${esc(item.sym)}</span>${typePill}</div><div style="font-size:9px;color:#3a5070">${esc(item.name)}</div></div>
        ${right}
      </div>${history}
    </div>`;
  }).join('');

  return `
  <div style="margin:12px 12px 0;background:linear-gradient(135deg,#0f1e30,#0a1520);border:1px solid #1a2840;border-radius:8px;padding:14px 16px;margin-bottom:14px">
    <div style="font-size:9px;color:#3a5878;letter-spacing:1.5px;margin-bottom:8px">สรุปรายได้ประจำปี (ประมาณการ)</div>
    <div style="font-size:24px;font-weight:700;color:#fbbf24;font-family:'Sora',ui-sans-serif,-apple-system,sans-serif">฿${fmt(totalDiv,0)}</div>
    <div style="display:flex;gap:16px;margin-top:8px;flex-wrap:wrap">
      <div><span style="font-size:9px;color:#4a6080">ปันผลหุ้น+กองทุน </span><span style="font-size:11px;color:#7aa2ff">฿${fmt(stockFundDiv,0)}</span></div>
      <div><span style="font-size:9px;color:#4a6080">ดอกเบี้ยหุ้นกู้/ปี </span><span style="font-size:11px;color:#f97316">฿${fmt(bondAi,0)}</span></div>
    </div>
    <div style="margin-top:6px;font-size:9px;color:#2a4060">/เดือน ≈ <span style="color:#fbbf24">฿${fmt(totalDiv/12,0)}</span></div>
  </div>
  <div style="padding:4px 12px 8px;font-size:9px;color:#4a6080;letter-spacing:1.5px">รายละเอียดแต่ละตัว</div>
  ${itemCards}
  ${items.length===0?'<div style="padding:40px;text-align:center;color:#2a4060">ยังไม่มีข้อมูลปันผล</div>':''}
  <div style="height:60px"></div>`;
}

// ── HISTORY ──────────────────────────────────────────────
function tabHistory(C) {
  const all=[
    ...(S.stockTx||[]).map(t=>({...t,asset:'stock'})),
    ...(S.fundTx||[]).map(t=>({...t,asset:'fund'})),
    ...(S.bondTx||[]).map(t=>({...t,asset:'bond'})),
    ...(S.cryptoTx||[]).map(t=>({...t,asset:'crypto'})),
  ].sort((a,b)=>b.id-a.id);
  const rows=all.map(tx=>{
    const icon=tx.asset==='fund'?'🏦':tx.asset==='bond'?'🏛':tx.asset==='crypto'?'🪙':'📈';
    const badge=tx.type==='BUY'?'<span class="pill pill-g">ซื้อ</span>':tx.type==='SELL'?'<span class="pill pill-r">ขาย</span>':'<span class="pill pill-b">ปันผล</span>';
    const val=(tx.asset==='stock'||tx.asset==='crypto')
      ?`<div style="font-size:11px;color:#c8d6e5">${fmtQ(tx.qty)} × ฿${fmt(tx.price,tx.price>=1?2:4)}</div><div style="font-size:10px;color:#7aa2ff">฿${fmt(tx.qty*tx.price,0)}</div>`
      :`<div style="font-size:12px;color:${tx.type==='BUY'?'#00e5a0':'#ff4d6d'};font-weight:600">${tx.type==='BUY'?'+':'-'}฿${fmt(tx.amount,0)}</div>`;
    return `<div style="border-bottom:1px solid #0d1828;padding:10px 14px;display:flex;align-items:center;gap:10px">
      <div style="font-size:15px">${icon}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font-weight:600;color:#e8f4ff;font-family:'Sora',ui-sans-serif,-apple-system,sans-serif;font-size:12px">${esc(tx.sym)}</span>${badge}</div>
        <div style="font-size:9px;color:#4a6080;margin-top:2px">${tx.date}${tx.note&&tx.note!=='Initial'?' · '+esc(tx.note):''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">${val}</div>
      <button class="btn-d" onclick="deleteTx('${tx.asset}',${tx.id})">✕</button>
    </div>`;
  }).join('');
  return `${rows}<div style="height:60px"></div>`;
}

// ── HELPERS ──────────────────────────────────────────────
function miniCards(items) {
  return `<div class="grid3">${items.map(([l,v,c])=>`<div class="mini-card"><div style="font-size:9px;color:#4a6080;letter-spacing:1px">${l}</div><div style="font-size:12px;font-weight:700;color:${c};margin-top:3px">${v}</div></div>`).join('')}</div>`;
}
function editableCell(sym, type, val, decimals) {
  const k=`${sym}__${type}`;
  if(S.editKey===k) {
    return `<span style="display:inline-flex;gap:3px">
      <input class="price-input-inline" id="ei-input" type="number" value="${val}" onkeydown="eiKey(event,'${esc(sym)}','${type}')" step="any">
      <button class="btn-g" style="padding:2px 7px;font-size:10px" onclick="commitEdit('${esc(sym)}','${type}')">✓</button>
    </span>`;
  }
  return `<span class="editable" onclick="startEdit('${esc(sym)}','${type}')">${fmt(val,decimals)}</span>`;
}

// ═══════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════
function openModal(type) {
  S.modalOpen=true; S.modalType=type;
  if(!S.formAsset) S.formAsset='stock';
  renderModal();
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  S.modalOpen=false;
}
function renderModal() {
  const assets=[['stock','📈 หุ้น'],['fund','🏦 กองทุน'],['bond','🏛 หุ้นกู้'],['crypto','🪙 คริปโต']];
  const seg=`<div class="seg">${assets.map(([k,v])=>`<button class="seg-btn${S.formAsset===k?' on':''}" onclick="setFormAsset('${k}');renderModal()">${v}</button>`).join('')}</div>`;
  let body='';
  if(S.formAsset==='stock'){
    body=`${seg}
      <label class="lbl">ชื่อย่อหุ้น *</label><input id="n-sym" placeholder="เช่น PTT">
      <label class="lbl">ชื่อบริษัท</label><input id="n-name" placeholder="ชื่อเต็ม">
      <label class="lbl">ราคาตลาด (บาท) *</label><input type="number" id="n-price" placeholder="บาท">
      <div style="display:flex;gap:8px;margin-top:16px"><button class="btn-p" onclick="saveNew('stock')" style="flex:1">เพิ่มและกรอกการซื้อ →</button><button class="btn-g" onclick="closeModal()">ยกเลิก</button></div>`;
  } else if(S.formAsset==='fund'){
    const catOpts=FUND_CATS.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
    body=`${seg}
      <label class="lbl">ชื่อย่อกองทุน *</label><input id="n-sym" placeholder="เช่น K-CASH">
      <label class="lbl">ชื่อกองทุน</label><input id="n-name" placeholder="ชื่อเต็ม">
      <label class="lbl">ประเภท</label><select id="n-cat">${catOpts}</select>
      <div style="display:flex;gap:8px;margin-top:16px"><button class="btn-p" onclick="saveNew('fund')" style="flex:1">เพิ่ม →</button><button class="btn-g" onclick="closeModal()">ยกเลิก</button></div>`;
  } else if(S.formAsset==='bond'){
    body=`${seg}
      <label class="lbl">ชื่อย่อหุ้นกู้ *</label><input id="n-sym" placeholder="เช่น BCP26NB">
      <label class="lbl">ชื่อหุ้นกู้</label><input id="n-name">
      <div class="grid2">
        <div><label class="lbl">จำนวนหน่วย *</label><input type="number" id="n-units" placeholder="50"></div>
        <div><label class="lbl">พาร์/หน่วย</label><input type="number" id="n-par" value="1000"></div>
        <div><label class="lbl">อัตราดอกเบี้ย % *</label><input type="number" id="n-rate" placeholder="3.45"></div>
        <div><label class="lbl">วันครบกำหนด</label><input id="n-mat" placeholder="2 พ.ย. 2569"></div>
        <div class="span2"><label class="lbl">จ่ายดอกเบี้ยครั้งถัดไป</label><input id="n-next" placeholder="5 พ.ค. 2569"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px"><button class="btn-p" onclick="saveNew('bond')" style="flex:1">เพิ่มหุ้นกู้ →</button><button class="btn-g" onclick="closeModal()">ยกเลิก</button></div>`;
  } else {
    body=`${seg}
      <label class="lbl">ชื่อย่อเหรียญ *</label><input id="n-sym" placeholder="เช่น BTC">
      <label class="lbl">ชื่อเหรียญ</label><input id="n-name" placeholder="Bitcoin">
      <label class="lbl">CoinGecko ID (สำหรับราคา live)</label><input id="n-cgid" placeholder="bitcoin">
      <div style="font-size:9px;color:#3a5878;margin-top:4px">หา ID ได้ที่ coingecko.com/th</div>
      <div style="display:flex;gap:8px;margin-top:16px"><button class="btn-p" onclick="saveNew('crypto')" style="flex:1">เพิ่มและกรอกการซื้อ →</button><button class="btn-g" onclick="closeModal()">ยกเลิก</button></div>`;
  }
  document.getElementById('modal-box').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="font-family:'Sora',ui-sans-serif,-apple-system,sans-serif;font-weight:700;color:#e8f4ff;font-size:15px">เพิ่มสินทรัพย์ใหม่</span>
      <button class="btn-d" style="opacity:.7;font-size:17px" onclick="closeModal()">✕</button>
    </div>${body}`;
}

// ═══════════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════════
function setTab(t){ S.tab=t; saveState(); render(); }
function toggleForm(){ S.formOpen=!S.formOpen; render(); }
function setFormAsset(a){ S.formAsset=a; render(); }
function startEdit(sym,type){ S.editKey=`${sym}__${type}`; render(); setTimeout(()=>{const el=document.getElementById('ei-input');if(el){el.focus();el.select();}},30); }
function eiKey(e,sym,type){ if(e.key==='Enter')commitEdit(sym,type); if(e.key==='Escape'){S.editKey=null;render();} }
function commitEdit(sym,type){
  const el=document.getElementById('ei-input'); if(!el)return;
  const v=parseFloat(el.value); if(!isNaN(v)&&v>0){
    if(type==='stock') S.stockPx[sym]=v;
    else if(type==='fund') S.fundPx[sym]=v;
    else if(type==='crypto') S.cryptoPx[sym]=v;
  }
  S.editKey=null; saveState(); render();
}
function addTx(asset) {
  const date=v('f-date')||today(), sym=(v('f-sym')||'').toUpperCase(), type=v('f-type')||'BUY', note=v('f-note')||'';
  if(!sym) return alert('กรุณาระบุชื่อ');
  const id=Date.now();
  if(asset==='stock'){
    const qty=parseFloat(v('f-qty')||0), price=parseFloat(v('f-price')||0);
    if(!qty||!price) return alert('กรุณาระบุจำนวนและราคา');
    S.stockTx.push({id,date,sym,type,qty,price,note});
    if(!S.stockPx[sym]) S.stockPx[sym]=price;
    if(!S.stockMeta[sym]) S.stockMeta[sym]=sym;
  } else if(asset==='fund'){
    const amount=parseFloat(v('f-amount')||0);
    if(!amount) return alert('กรุณาระบุจำนวนเงิน');
    S.fundTx.push({id,date,sym,type,amount,note});
    if(S.fundPx[sym]===undefined) S.fundPx[sym]=amount;
    if(!S.fundMeta[sym]) S.fundMeta[sym]={n:sym,cat:'อื่นๆ',units:0,avgNav:0};
  } else if(asset==='bond'){
    const amount=parseFloat(v('f-amount')||0);
    if(!amount) return alert('กรุณาระบุจำนวนเงิน');
    S.bondTx.push({id,date,sym,type,amount,note});
  } else {
    const qty=parseFloat(v('f-qty')||0), price=parseFloat(v('f-price')||0);
    if(!qty) return alert('กรุณาระบุจำนวน');
    S.cryptoTx.push({id,date,sym,type,qty,price,note});
    if(!S.cryptoPx[sym]) S.cryptoPx[sym]=price||0;
    if(!S.cryptoMeta[sym]) S.cryptoMeta[sym]={n:sym,cgid:''};
  }
  S.formOpen=false; saveState(); render();
}
function saveNew(asset) {
  const sym=(v('n-sym')||'').toUpperCase(); if(!sym) return alert('กรุณาระบุชื่อย่อ');
  if(asset==='stock'){
    const price=parseFloat(v('n-price')||0);
    S.stockMeta[sym]=v('n-name')||sym; S.stockPx[sym]=price||0;
    closeModal(); S.formOpen=true; S.formAsset='stock';
  } else if(asset==='fund'){
    const cat=v('n-cat')||'อื่นๆ';
    S.fundMeta[sym]={n:v('n-name')||sym,cat,units:0,avgNav:0}; S.fundPx[sym]=0;
    closeModal(); S.formOpen=true; S.formAsset='fund';
  } else if(asset==='bond'){
    const units=parseInt(v('n-units')||0), par=parseFloat(v('n-par')||1000);
    const rate=parseFloat(v('n-rate')||0), mat=v('n-mat')||'', next=v('n-next')||'';
    if(!units||!rate) return alert('กรุณาระบุจำนวนหน่วยและอัตราดอกเบี้ย');
    S.bonds.push({s:sym,n:v('n-name')||sym,units,par,face:units*par,rate,mat,next});
    S.bondTx.push({id:Date.now(),date:today(),sym,type:'BUY',amount:units*par,note:'Initial'});
    closeModal(); S.tab='bonds';
  } else {
    S.cryptoMeta[sym]={n:v('n-name')||sym,cgid:v('n-cgid')||''}; S.cryptoPx[sym]=0;
    if(!S.bonds) S.bonds=[];
    closeModal(); S.formOpen=true; S.formAsset='crypto';
  }
  saveState(); render();
}
function deleteTx(asset, id) {
  if(asset==='stock') S.stockTx=S.stockTx.filter(t=>t.id!==id);
  else if(asset==='fund') S.fundTx=S.fundTx.filter(t=>t.id!==id);
  else if(asset==='bond') S.bondTx=S.bondTx.filter(t=>t.id!==id);
  else S.cryptoTx=S.cryptoTx.filter(t=>t.id!==id);
  saveState(); render();
}
function deleteBond(sym) {
  S.bonds=S.bonds.filter(b=>b.s!==sym);
  S.bondTx=S.bondTx.filter(t=>t.sym!==sym);
  saveState(); render();
}
function v(id){ const el=document.getElementById(id); return el?el.value:''; }

// ── Close modal on overlay click ──
document.getElementById('modal-overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('modal-overlay')) closeModal();
});

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
render();
setTimeout(fetchPrices, 100); // non-blocking: render first, then fetch

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
